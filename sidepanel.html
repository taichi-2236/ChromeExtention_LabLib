<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LabLib - 論文ライブラリ</title>
  <link rel="stylesheet" href="sidepanel.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- ===== ヘッダー ===== -->
  <header id="app-header">
    <div class="header-top">
      <div class="logo-area">
        <svg class="logo-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 6C4 4.89543 4.89543 4 6 4H18C19.1046 4 20 4.89543 20 6V18C20 19.1046 19.1046 20 18 20H6C4.89543 20 4 19.1046 4 18V6Z" stroke="currentColor" stroke-width="1.5"/>
          <path d="M8 8H16M8 12H14M8 16H12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <h1 class="app-title">LabLib</h1>
      </div>
      <button id="btn-save-paper" class="btn-primary" title="開いているタブの論文を保存">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        <span>保存</span>
      </button>
    </div>

    <!-- 検索バー -->
    <div class="search-bar">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" id="search-input" placeholder="タイトル・タグで検索..." autocomplete="off">
      <button id="btn-clear-search" class="btn-icon btn-clear-search" title="検索をクリア" style="display:none;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </header>

  <!-- ===== ツールバー (一括操作) ===== -->
  <div id="toolbar" class="toolbar">
    <div class="toolbar-left">
      <label class="checkbox-wrapper select-all-wrapper" title="すべて選択">
        <input type="checkbox" id="checkbox-select-all">
        <span class="checkbox-custom"></span>
        <span class="select-all-label">すべて選択</span>
      </label>
      <span id="selected-count" class="selected-count">0件選択中</span>
    </div>
    <div class="toolbar-right">
      <button id="btn-bulk-reference" class="btn-toolbar" title="参考文献リストを作成">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <polyline points="10 9 9 9 8 9"></polyline>
        </svg>
        <span>参考文献</span>
      </button>
      <button id="btn-bulk-download" class="btn-toolbar" title="選択した論文をダウンロード">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        <span>DL</span>
      </button>
      <button id="btn-bulk-delete" class="btn-toolbar btn-danger" title="選択した論文を削除">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        </svg>
        <span>削除</span>
      </button>
    </div>
  </div>

  <!-- ===== 論文カードリスト ===== -->
  <main id="paper-list" class="paper-list">
    <!-- ===== 空状態 ===== -->
    <div id="empty-state" class="empty-state">
      <svg class="empty-icon" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
        <polyline points="14 2 14 8 20 8"></polyline>
      </svg>
      <p class="empty-title">論文がまだありません</p>
      <p class="empty-description">上の「保存」ボタンから<br>開いているタブの論文を保存しましょう</p>
    </div>

    <!-- ===== 論文カード テンプレート（JSで動的生成） ===== -->
    <!--
    <article class="paper-card" data-id="xxx">
      <div class="card-checkbox-area">
        <label class="checkbox-wrapper">
          <input type="checkbox" class="paper-checkbox" data-id="xxx">
          <span class="checkbox-custom"></span>
        </label>
      </div>
      <div class="card-body">
        <h3 class="card-title">論文タイトルが入ります</h3>
        <div class="card-tags">
          <span class="tag">機械学習</span>
          <span class="tag">NLP</span>
        </div>
      </div>
      <button class="btn-card-detail" title="詳細を表示">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </button>
    </article>
    -->
  </main>

  <!-- ===== 保存ポップアップ (モーダル) ===== -->
  <div id="modal-overlay" class="modal-overlay" style="display:none;">
    <div class="modal" id="save-modal">
      <div class="modal-header">
        <h2 class="modal-title">論文を保存</h2>
        <button id="btn-modal-close" class="btn-icon" title="閉じる">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <!-- URL表示 -->
        <div class="form-group">
          <label class="form-label" for="save-url">URL</label>
          <input type="text" id="save-url" class="form-input" readonly placeholder="タブのURLが入ります">
        </div>
        <!-- タイトル入力 -->
        <div class="form-group">
          <label class="form-label" for="save-title">タイトル</label>
          <input type="text" id="save-title" class="form-input" placeholder="論文のタイトルを入力" autocomplete="off">
        </div>
        <!-- タグ入力 -->
        <div class="form-group">
          <label class="form-label" for="save-tags">タグ</label>
          <div class="tag-input-wrapper">
            <div id="tag-input-tags" class="tag-input-tags">
              <!-- 追加されたタグが表示される -->
            </div>
            <input type="text" id="save-tags" class="form-input tag-input" placeholder="タグを入力してEnter" autocomplete="off">
          </div>
          <!-- タグサジェスト -->
          <ul id="tag-suggestions" class="tag-suggestions" style="display:none;">
            <!--
            <li class="tag-suggestion-item">
              <span class="suggestion-name">機械学習</span>
              <span class="suggestion-count">5件</span>
            </li>
            -->
          </ul>
        </div>
      </div>
      <div class="modal-footer">
        <button id="btn-modal-cancel" class="btn-secondary">キャンセル</button>
        <button id="btn-modal-save" class="btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
            <polyline points="17 21 17 13 7 13 7 21"></polyline>
            <polyline points="7 3 7 8 15 8"></polyline>
          </svg>
          保存
        </button>
      </div>
    </div>
  </div>

  <!-- ===== 詳細パネル (スライドイン) ===== -->
  <div id="detail-panel" class="detail-panel" style="display:none;">
    <div class="detail-header">
      <button id="btn-detail-back" class="btn-icon" title="戻る">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <h2 class="detail-heading">論文の詳細</h2>
      <div class="detail-header-spacer"></div>
    </div>
    <div class="detail-body">
      <!-- タイトル（編集可能） -->
      <div class="detail-section">
        <div class="detail-section-header">
          <label class="detail-label">タイトル</label>
          <button id="btn-edit-title" class="btn-icon-sm" title="タイトルを編集">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
          </button>
        </div>
        <p id="detail-title" class="detail-title">論文タイトル</p>
        <input type="text" id="detail-title-input" class="form-input detail-edit-input" style="display:none;">
      </div>

      <!-- タグ（編集可能） -->
      <div class="detail-section">
        <div class="detail-section-header">
          <label class="detail-label">タグ</label>
          <button id="btn-edit-tags" class="btn-icon-sm" title="タグを編集">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
          </button>
        </div>
        <div id="detail-tags" class="card-tags">
          <!-- タグ表示 -->
        </div>
        <div id="detail-tags-edit" class="tag-input-wrapper" style="display:none;">
          <div id="detail-tag-input-tags" class="tag-input-tags"></div>
          <input type="text" id="detail-tag-input" class="form-input tag-input" placeholder="タグを入力してEnter" autocomplete="off">
        </div>
      </div>

      <!-- URL / リンク -->
      <div class="detail-section">
        <label class="detail-label">リンク</label>
        <div class="detail-link-area">
          <a id="detail-url" class="detail-url" href="#" target="_blank" rel="noopener noreferrer">https://example.com/paper</a>
        </div>
        <div class="detail-actions">
          <button id="btn-copy-link" class="btn-action">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
            リンクをコピー
          </button>
          <button id="btn-download-paper" class="btn-action">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            ダウンロード
          </button>
        </div>
      </div>
    </div>
    <div class="detail-footer">
      <button id="btn-delete-paper" class="btn-danger-outline">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        </svg>
        この論文を削除
      </button>
    </div>
  </div>

  <!-- ===== 参考文献リスト モーダル ===== -->
  <div id="reference-modal-overlay" class="modal-overlay" style="display:none;">
    <div class="modal modal-wide" id="reference-modal">
      <div class="modal-header">
        <h2 class="modal-title">参考文献リスト</h2>
        <button id="btn-reference-close" class="btn-icon" title="閉じる">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <textarea id="reference-output" class="reference-textarea" readonly placeholder="選択した論文から参考文献リストが生成されます"></textarea>
      </div>
      <div class="modal-footer">
        <button id="btn-copy-reference" class="btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
          コピー
        </button>
      </div>
    </div>
  </div>

  <!-- ===== トースト通知 ===== -->
  <div id="toast-container" class="toast-container"></div>

  <script src="sidepanel.js"></script>
</body>
</html>
